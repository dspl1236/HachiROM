name: Build HachiROM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build EXE
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/HachiROM.exe
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/HachiROM.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build app
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-macOS
          path: dist/HachiROM

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Build binary
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Linux
          path: dist/HachiROM
