name: Build HachiROM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build EXE
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/HachiROM.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/windows

      - name: Delete existing latest tag and release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling latest release
        run: |
          NOTES="Rolling release — updated automatically on every push to main.

          Supports: 893906266D (7A Late) · 893906266B (7A Early) · 4A0906266 (AAH 12v V6)

          Windows: HachiROM.exe — standalone, no install needed

          macOS and Linux builds temporarily disabled pending Windows validation.

          Commit: ${{ github.sha }}"

          gh release create latest \
            --title "HachiROM — latest build (Windows)" \
            --notes "$NOTES" \
            --prerelease \
            dist/windows/HachiROM.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
