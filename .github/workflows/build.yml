name: Build HachiROM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build EXE
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/HachiROM.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build app
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-macOS
          path: dist/HachiROM

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Build binary
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Linux
          path: dist/HachiROM

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-macOS
          path: dist/macos

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-Linux
          path: dist/linux

      - name: Rename platform binaries
        run: |
          cp dist/macos/HachiROM dist/HachiROM-macOS
          cp dist/linux/HachiROM dist/HachiROM-Linux
          chmod +x dist/HachiROM-macOS dist/HachiROM-Linux

      - name: Delete existing latest tag and release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling latest release
        run: |
          NOTES="Rolling release — updated automatically on every push to main.

          Supports: 893906266D (7A Late) · 893906266B (7A Early) · 4A0906266 (AAH 12v V6)

          Windows: HachiROM.exe — standalone, no install needed
          macOS:   HachiROM-macOS — run chmod +x first
          Linux:   HachiROM-Linux — run chmod +x first

          Commit: ${{ github.sha }}"

          gh release create latest \
            --title "HachiROM — latest build" \
            --notes "$NOTES" \
            --prerelease \
            dist/windows/HachiROM.exe \
            dist/HachiROM-macOS \
            dist/HachiROM-Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
