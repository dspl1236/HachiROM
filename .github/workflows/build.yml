name: Build HachiROM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build EXE
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Windows
          path: |
            dist/HachiROM-v*.exe
            dist/exe_name.txt

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xkb1 \
            libxkbcommon-x11-0 libgl1 libegl1
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build binary
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-Linux
          path: |
            dist/HachiROM-v*
            dist/exe_name.txt

  build-macos:
    # Try macos-latest (Apple Silicon). PyQt5 wheels may work via pip's
    # universal2 or x86_64 builds under Rosetta on the runner.
    # If this fails consistently, we'll drop macOS CI and document
    # "build from source" until the PyQt6 migration.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build binary
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HachiROM-macOS
          path: |
            dist/HachiROM-v*
            dist/exe_name.txt

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-Windows
          path: dist/windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-Linux
          path: dist/linux

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: HachiROM-macOS
          path: dist/macos

      - name: Read version name and derive platform filenames
        id: bins
        run: |
          BASE=$(cat dist/windows/exe_name.txt | sed 's/\.exe//')
          echo "windows=${BASE}.exe" >> $GITHUB_OUTPUT
          echo "linux=${BASE}-linux"  >> $GITHUB_OUTPUT
          echo "macos=${BASE}-macos"  >> $GITHUB_OUTPUT
          mv dist/linux/${BASE}  dist/linux/${BASE}-linux  2>/dev/null || true
          mv dist/macos/${BASE}  dist/macos/${BASE}-macos  2>/dev/null || true

      - name: Delete existing latest tag and release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rolling latest release
        run: |
          NOTES="Rolling release — built automatically from main.

          Supports: 893906266D (7A Late) · 893906266B (7A Early) · 4A0906266 (AAH 12v V6)

          **Windows** — ${{ steps.bins.outputs.windows }}
          Standalone EXE, no install needed.

          **Linux** — ${{ steps.bins.outputs.linux }}
          \`chmod +x HachiROM-v*-linux && ./HachiROM-v*-linux\`
          Requires libxcb / libGL (apt: libxcb-xinerama0 libgl1-mesa-glx).

          **macOS** — ${{ steps.bins.outputs.macos }}
          Built on Intel (macOS 13). \`chmod +x HachiROM-v*-macos && ./HachiROM-v*-macos\`
          First run: right-click → Open to bypass Gatekeeper (unsigned binary).
          Apple Silicon: runs via Rosetta 2.

          Commit: ${{ github.sha }}"

          gh release create latest \
            --title "HachiROM — latest build" \
            --notes "$NOTES" \
            --prerelease \
            "dist/windows/${{ steps.bins.outputs.windows }}" \
            "dist/linux/${{ steps.bins.outputs.linux }}" \
            "dist/macos/${{ steps.bins.outputs.macos }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
